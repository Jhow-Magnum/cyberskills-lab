apiVersion: ctf.cyberskills.io/v1
kind: Challenge
metadata:
  name: network
  version: "1.0.0"
  description: "Desafios de Network Security"
  author: "Tryg_Gelt"
  difficulty: "medium"
  duration: "90m"
spec:
  environment:
    image: cyberskills-lab/network:latest
    resources:
      cpu: "1"
      memory: "512Mi"
    ports:
      - container: 22
    credentials:
      user: root
      password: root
  challenges:
    - id: 1
      name: "IP do Container"
      description: "Execute /opt/network/challenge1.sh e descubra o IP do container. Use comandos de rede."
      points: 40
      hints:
        - text: "Use ip addr, ifconfig ou hostname -I para ver o IP"
      validation:
        type: "flag"
        flag: "flag{N3TW0RK_1P}"
        location: "/opt/network/challenge1.sh"
    - id: 2
      name: "Portas Abertas"
      description: "Execute /opt/network/challenge2.sh e conte quantas portas TCP estão em estado LISTEN."
      points: 40
      hints:
        - text: "Use: netstat -tuln | grep LISTEN | wc -l ou ss -tuln"
      validation:
        type: "flag"
        flag: "flag{P0RT_C0UNT}"
        location: "/opt/network/challenge2.sh"
    - id: 3
      name: "Porta SSH"
      description: "Execute /opt/network/challenge3.sh e identifique em qual porta o SSH está escutando."
      points: 40
      hints:
        - text: "Use: netstat -tuln | grep ssh ou cat /etc/ssh/sshd_config"
      validation:
        type: "flag"
        flag: "flag{SSH_P0RT_22}"
        location: "/opt/network/challenge3.sh"
  scoring:
    total_points: 120
