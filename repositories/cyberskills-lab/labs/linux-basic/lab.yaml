apiVersion: ctf.cyberskills.io/v1
kind: Challenge
metadata:
  name: linux-basic
  version: "1.0.0"
  description: "Desafios básicos de Linux"
  author: "Tryg_Gelt"
  difficulty: "easy"
  duration: "60m"

spec:
  environment:
    image: cyberskills-lab/linux-basic:latest
    resources:
      cpu: "1"
      memory: "512Mi"
    ports:
      - container: 22
    credentials:
      user: root
      password: root
  
  challenges:
    - id: 1
      name: "Primeiro Contato"
      description: "Descubra qual usuário você é."
      points: 10
      hints:
        - text: "Use o comando whoami"
      validation:
        type: "flag"
        flag: "flag{root}"
    
    - id: 2
      name: "Arquivo Invertido"
      description: "Navegue até /root/data e leia secret.txt. O conteúdo está invertido!"
      points: 15
      hints:
        - text: "Use cat e rev para inverter"
      validation:
        type: "flag"
        flag: "flag{paSt4}"
    
    - id: 3
      name: "Script Sem Permissão"
      description: "Encontre o script oculto em /root que começa com .flag e NÃO tem permissão de execução. Dê permissão e execute."
      points: 20
      hints:
        - text: "Use ls -la para ver arquivos ocultos"
        - text: "Use chmod +x para dar permissão"
        - text: "Execute com bash ou ./"
      validation:
        type: "flag"
        flag: "flag{h1dd3n_scr1pt}"
    
    - id: 4
      name: "Histórico de Comandos"
      description: "Procure a flag no histórico de comandos do bash."
      points: 15
      hints:
        - text: "Use cat ~/.bash_history ou history"
      validation:
        type: "flag"
        flag: "flag{h1st0ry_m4tt3rs}"
    
    - id: 5
      name: "Processo Init"
      description: "Identifique o nome do processo com PID 1."
      points: 20
      hints:
        - text: "Use ps -p 1 -o comm="
      validation:
        type: "flag"
        flag: "flag{start.sh}"
    
    - id: 6
      name: "Arquivos Ocultos"
      description: "Conte quantos arquivos ocultos (começam com .) existem em /root. Não conte diretórios."
      points: 15
      hints:
        - text: "Use ls -la /root | grep ^- | grep ' \\.' | wc -l"
      validation:
        type: "flag"
        flag: "flag{6}"
    
    - id: 7
      name: "SUID Binaries"
      description: "Conte quantos binários SUID existem em /usr/bin."
      points: 25
      hints:
        - text: "Use find /usr/bin -perm -4000 -type f 2>/dev/null | wc -l"
      validation:
        type: "flag"
        flag: "flag{3}"
    
    - id: 8
      name: "Cron Jobs"
      description: "Encontre a flag no arquivo de cron em /etc/cron.d/"
      points: 20
      hints:
        - text: "Use cat /etc/cron.d/ctf-cron"
      validation:
        type: "flag"
        flag: "flag{cr0n_m4st3r}"
    
    - id: 9
      name: "ACL Específica"
      description: "Leia o arquivo em /opt/secure/secret.txt"
      points: 25
      hints:
        - text: "Você já tem permissão via grupo ctfgroup"
      validation:
        type: "flag"
        flag: "flag{acl_m4st3r}"
    
    - id: 10
      name: "PATH Hijacking"
      description: "Crie um script falso 'ls' em /tmp e ajuste PATH para executar /usr/local/bin/check"
      points: 30
      hints:
        - text: "PATH=/tmp:$PATH"
      validation:
        type: "flag"
        flag: "flag{p4th_pwn3d}"
    
    - id: 11
      name: "Variável de Ambiente"
      description: "Encontre a flag na variável FLAG_ENV"
      points: 20
      hints:
        - text: "Use source ~/.bashrc && echo $FLAG_ENV"
      validation:
        type: "flag"
        flag: "flag{3nv_s3cr3t}"
    
    - id: 12
      name: "Processo Temporário"
      description: "Monitore /tmp para capturar arquivo temporário que aparece a cada 30 segundos"
      points: 30
      hints:
        - text: "Use watch -n 1 'ls -la /tmp | grep flag'"
      validation:
        type: "flag"
        flag: "flag{t3mp_hunt3r}"
    
    - id: 13
      name: "Socket Unix"
      description: "Conecte ao socket em /var/run/ctf.sock"
      points: 35
      hints:
        - text: "Use nc -U /var/run/ctf.sock"
      validation:
        type: "flag"
        flag: "flag{s0ck3t_m4g1c}"
    
    - id: 14
      name: "Strings no Binário"
      description: "Extraia a flag do binário em /opt/mystery/binary"
      points: 40
      hints:
        - text: "Use strings /opt/mystery/binary"
      validation:
        type: "flag"
        flag: "flag{b1n_r3v3rs3d}"

  scoring:
    total_points: 280
